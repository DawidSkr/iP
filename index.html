<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>iPhone Flip Calculator</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #121212;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    background: #1e1e1e;
    color: #fff;
    padding: 30px 40px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    text-align: center;
    width: 85%;
    max-width: 300px;
  }

  @media (max-width: 500px) {
    .container {
        padding: 25px 20px;
    }
    h1 {
        font-size: 20px;
    }
    select {
        font-size: 16px;
        padding: 10px;
    }
    .kupDo {
        font-size: 22px;
    }
    .rynek, .potencjal {
        font-size: 16px;
    }
}

  h1 {
    font-size: 22px;
    margin-bottom: 25px;
    color: #fff;
  }

  .form-group {
    margin-bottom: 15px;
    text-align: left;
  }

  .form-group label {
    font-size: 13px;
    color: #bbb;
    margin-bottom: 5px;
    display: block;
  }

  select {
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #555;
    font-size: 14px;
    background-color: #2b2b2b;
    color: #fff;
  }

  button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: #388e3c;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #2e7d32;
  }

  .result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    background: #e8f5e9;
    color: #2e7d32;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  .no-data {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    background: #ffebee;
    color: #c62828;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

.result-line {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-radius: 8px;
    margin-top: 10px;
    font-weight: bold;
    color: #fff;
}

.kupDo {
    font-size: 24px;
    color: rgb(20, 201, 20);
    font-weight: bold;
    margin-bottom: 6px;
}

.rynek {
    font-size: 15px;
}

.potencjal {
    font-size: 15px;
    color: #d1d1d1; 
}

#results {
    margin-top: 20px; 
}

.version {
    font-size: 14px;
    color: #aaa; 
    margin-top: 15px;
    text-align: center;
}

</style>
</head>
<body>

<div class="container">
  <h1>📱iPhone Flip Calculator</h1>

  <div class="form-group">
    <label for="model">Model:</label>
    <select id="model"></select>
  </div>

  <div class="form-group">
    <label for="memory">Pamięć:</label>
    <select id="memory"></select>
  </div>

  <button id="checkBtn">Sprawdź</button>

  <div id="results"></div>

  <div class="version">Wersja: 04.2026</div>
</div>

<script src="script.js"></script>
</body>
</html>
